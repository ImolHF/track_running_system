{% extends "base.html" %}
{% block title %}AI 教练 - 首都高校一体化训练平台管理系统{% endblock %}

{% block content %}
<div class="row" style="height: calc(100vh - 140px)">
    <!-- Left sidebar -->
    <div class="col-md-3 border-end d-flex flex-column" style="height:100%">
        <div class="mb-3">
            <label class="form-label small text-muted">选择运动员</label>
            <select id="athleteSelect" class="form-select form-select-sm">
                <option value="">-- 选择 --</option>
                {% for a in athletes %}
                <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button id="createPlanBtn" class="btn btn-primary btn-sm w-100 mb-3" disabled data-bs-toggle="modal" data-bs-target="#planModal">📋 创建新计划</button>

        <div class="small text-muted mb-1">已有计划</div>
        <div id="planList" class="flex-grow-1 overflow-auto">
            <p class="text-muted small">请先选择运动员</p>
        </div>
    </div>

    <!-- Right main area -->
    <div class="col-md-9 d-flex flex-column" style="height:100%">
        <div id="planHeader" class="d-none mb-2">
            <h6 id="planTitle" class="mb-0"></h6>
        </div>

        <div id="chatMessages" class="flex-grow-1 overflow-auto rounded bg-light p-3 mb-2" style="flex:1">
            <div class="text-center text-muted py-5">
                <h5>👋 AI 教练助手</h5>
                <p>选择运动员，创建计划，开始智能训练指导</p>
            </div>
        </div>

        <div id="chatInputArea" class="input-group d-none">
            <input type="text" id="chatInput" class="form-control" placeholder="输入消息...">
            <button class="btn btn-dark" id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- Plan creation modal -->
<div class="modal fade" id="planModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">创建训练计划</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small">训练目标 <span class="text-danger">*</span></label>
                    <textarea id="planGoal" class="form-control form-control-sm" rows="2" placeholder="例如：5公里跑进18分、半马完赛、提高有氧基础..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label small">每周可训练天数</label>
                    <select id="planDays" class="form-select form-select-sm">
                        <option value="">不限</option>
                        <option value="3">3天</option>
                        <option value="4">4天</option>
                        <option value="5">5天</option>
                        <option value="6">6天</option>
                        <option value="7">7天</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small">伤病或身体限制</label>
                    <input id="planInjury" class="form-control form-control-sm" placeholder="如：右膝旧伤、跟腱不适...">
                </div>
                <div class="mb-3">
                    <label class="form-label small">额外要求</label>
                    <textarea id="planExtra" class="form-control form-control-sm" rows="2" placeholder="如：重点练间歇、需要减重、早起训练..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-sm btn-primary" id="submitPlanBtn">提交，生成计划</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var athleteSelect = document.getElementById('athleteSelect');
    var createPlanBtn = document.getElementById('createPlanBtn');
    var planList = document.getElementById('planList');
    var chatMessages = document.getElementById('chatMessages');
    var chatInputArea = document.getElementById('chatInputArea');
    var chatInput = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var planHeader = document.getElementById('planHeader');
    var planTitle = document.getElementById('planTitle');
    var submitPlanBtn = document.getElementById('submitPlanBtn');
    var currentAthleteId = null;
    var currentPlanId = null;

    var markdown = function(text) {
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/^### (.+)/gm, '<h6>$1</h6>')
            .replace(/^## (.+)/gm, '<h5>$1</h5>')
            .replace(/^# (.+)/gm, '<h4>$1</h4>')
            .replace(/^- (.+)/gm, '• $1')
            .replace(/\n/g, '<br>');
    };

    function addMsg(role, content) {
        var div = document.createElement('div');
        div.className = 'mb-3 ' + (role === 'user' ? 'text-end' : '');
        var b = document.createElement('div');
        b.className = 'd-inline-block p-3 rounded ' + (role === 'user' ? 'bg-primary text-white text-start' : 'bg-white border text-start');
        b.style.cssText = 'max-width:85%;';
        b.innerHTML = markdown(content);
        div.appendChild(b);
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function clearChat() {
        chatMessages.innerHTML = '';
        chatInputArea.classList.add('d-none');
        planHeader.classList.add('d-none');
    }

    function loadPlans() {
        clearChat();
        fetch('/api/coach/plans?athlete_id=' + currentAthleteId)
            .then(function(r) { return r.json(); })
            .then(function(plans) {
                planList.innerHTML = '';
                if (plans.length === 0) {
                    planList.innerHTML = '<p class="text-muted small">暂无计划</p>';
                }
                plans.forEach(function(p) {
                    var card = document.createElement('div');
                    card.className = 'card card-sm mb-2';
                    card.style.cssText = 'cursor:pointer';
                    card.onclick = function() { openPlan(p.id); };
                    card.innerHTML = '<div class="card-body p-2"><small class="fw-bold">' + p.name + '</small><br><small class="text-muted">' + p.created_at + '</small></div>';
                    planList.appendChild(card);
                });
            });
    }

    function openPlan(planId) {
        currentPlanId = planId;
        chatMessages.innerHTML = '';
        fetch('/api/coach/plan/' + planId)
            .then(function(r) { return r.json(); })
            .then(function(plan) {
                planHeader.classList.remove('d-none');
                planTitle.textContent = plan.name;
                addMsg('assistant', plan.content);
            });
        fetch('/api/coach/messages?plan_id=' + planId)
            .then(function(r) { return r.json(); })
            .then(function(msgs) {
                chatMessages.innerHTML = '';
                planHeader.classList.remove('d-none');
                msgs.forEach(function(m) {
                    addMsg(m.role, m.content);
                });
                chatInputArea.classList.remove('d-none');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
    }

    function sendMsg() {
        var msg = chatInput.value.trim();
        if (!msg || !currentPlanId || !currentAthleteId) return;
        addMsg('user', msg);
        chatInput.value = '';
        chatInput.disabled = true;
        sendBtn.disabled = true;

        var form = new FormData();
        form.append('plan_id', currentPlanId);
        form.append('athlete_id', currentAthleteId);
        form.append('message', msg);

        fetch('/api/coach/chat', { method: 'POST', body: form })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                addMsg('assistant', data.reply || data.error || 'AI 服务暂不可用');
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            })
            .catch(function() {
                addMsg('assistant', '网络错误');
                chatInput.disabled = false;
                sendBtn.disabled = false;
            });
    }

    // Submit plan creation
    submitPlanBtn.addEventListener('click', function() {
        var goal = document.getElementById('planGoal').value.trim();
        if (!goal) { alert('请填写训练目标'); return; }

        createPlanBtn.disabled = true;
        createPlanBtn.textContent = '⏳ 生成中...';
        submitPlanBtn.disabled = true;

        var userInfo = '训练目标：' + goal;
        var days = document.getElementById('planDays').value;
        if (days) userInfo += '\n每周可训练天数：' + days + '天';
        var injury = document.getElementById('planInjury').value.trim();
        if (injury) userInfo += '\n伤病情况：' + injury;
        var extra = document.getElementById('planExtra').value.trim();
        if (extra) userInfo += '\n额外要求：' + extra;

        // Close modal
        var modal = bootstrap.Modal.getInstance(document.getElementById('planModal'));
        modal.hide();

        clearChat();
        addMsg('user', '创建训练计划\n\n' + userInfo);

        var form = new FormData();
        form.append('athlete_id', currentAthleteId);
        form.append('user_info', userInfo);

        fetch('/api/coach/create-plan', { method: 'POST', body: form })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                createPlanBtn.disabled = false;
                createPlanBtn.textContent = '📋 创建新计划';
                submitPlanBtn.disabled = false;
                if (data.plan_id) {
                    loadPlans();
                    openPlan(data.plan_id);
                }
            })
            .catch(function() {
                createPlanBtn.disabled = false;
                createPlanBtn.textContent = '📋 创建新计划';
                submitPlanBtn.disabled = false;
            });
    });

    // Event handlers
    athleteSelect.addEventListener('change', function() {
        currentAthleteId = this.value;
        currentPlanId = null;
        if (currentAthleteId) {
            createPlanBtn.disabled = false;
            loadPlans();
        } else {
            createPlanBtn.disabled = true;
            planList.innerHTML = '<p class="text-muted small">请先选择运动员</p>';
            clearChat();
        }
    });

    sendBtn.addEventListener('click', sendMsg);
    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMsg();
    });
})();
</script>
{% endblock %}
